name: Daily Article Generation

on:
  schedule:
    # 毎日 JST 9:00（UTC 0:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not commit)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  generate:
    name: Generate Article
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate article
        id: generate
        run: node scripts/generate-article.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Commit and push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git add content/blog/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TITLE="${{ steps.generate.outputs.title }}"
          git commit -m "blog: Add article - ${TITLE:-new article}"
          git push
